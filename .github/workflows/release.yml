name: Release with Static Files

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download costrict.tar.gz from latest release
        run: |
          gh release download v0.0.1 \
            --repo "${{ github.repository }}" \
            --pattern "costrict.tar.gz" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download wasm.tar.gz from latest release
        run: |
          gh release download v0.0.1 \
            --repo "${{ github.repository }}" \
            --pattern "wasm.tar.gz" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract costrict.tar.gz into config/portal/static_file
        run: tar -zxf costrict.tar.gz -C config/portal/static_file

      - name: Extract wasm.tar.gz into config/portal/static_file
        run: tar -zxf wasm.tar.gz -C config/portal

      - name: Remove downloaded tar.gz files
        run: rm -f costrict.tar.gz wasm.tar.gz

      - name: Create release archive
        run: |
          ARCHIVE_NAME="costrict-backend-deploy-${{ steps.tag.outputs.TAG_NAME }}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.tar.gz' \
            -czf "../${ARCHIVE_NAME}" \
            .
          mv "../${ARCHIVE_NAME}" .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Release ${{ steps.tag.outputs.TAG_NAME }}"
          body_path: docs/release-notes.md
          files: ${{ env.ARCHIVE_NAME }}
          generate_release_notes: false
