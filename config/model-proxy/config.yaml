server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"
jwtSettings:
  enable: true
  userIdField: ["properties","oauth_Custom_id"]
  userNameField: ["properties","oauth_Custom_username"]
  headerKey: [] # 除了authorization 外的Key,自动去除Bearer

logger:
  level: "info"         # debug, info, warn, error
  format: "json"     # json, console
  output: "console"        # console, file, both
  # filename: "logs/app.log"  # 日志文件路径
  # max_size: 100         # 单个日志文件最大大小，单位MB
  # max_backups: 5        # 保留的旧日志文件最大数量
  # max_age: 30           # 旧日志文件最多保留天数
  # compress: true        # 是否压缩旧日志文件

# Nacos 连接配置（通用，可被多个业务订阅者复用）
nacos:
  serverAddr: "nacos"
  serverPort: 8848           # Nacos HTTP 端口
  grpcPort: 9848             # Nacos gRPC 端口 
  namespace: "costrict"      # Nacos 命名空间

# 模型配置订阅目标（与 Nacos 连接配置独立）
modelConfig:
  dataId: "model-config"
  group: "MODEL_PROXY"
  fallbackFile: "models.json"  # Nacos 不可用时的本地回退文件

# 反向代理设置
proxySetting:
  # 建立连接超时
  dialTimeout: 30
  # 探测间隔
  dialKeepAlive: 30
  # 全局最大空闲连接数,0不限制
  maxIdleConns: 0
  # maxConnsPerHost 限制向同一上游 Host 最大空闲数
  maxIdleConnsPerHost: 200
  # maxConnsPerHost 限制向同一上游 Host 同时存在的 TCP 连接总数（活跃+空闲）。
  # 设置此值可防止批量请求耗尽本地临时端口，避免 "connect: cannot assign requested address"。
  # 建议根据上游并发承载能力调整，0不限制
  maxConnsPerHost: 0
  # 空闲连接超时时间
  IdleConnTimeout: 600